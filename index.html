<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clean Dots Background</title>

  <style>
    *{
        text-decoration: none;
        list-style: none;
        margin: 0;
        padding: 0;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }

    #bg {
      width: 100%;
      height: 100vh;
      transition: 0.2s;
    }

    .nav{
        border: 1px solid black;
        display: flex;
        border: none;
    }

    .app-label{
        width: 20%;
        margin: 3rem 9rem;
        font-family: segoe ui;
        font-size: 1.4rem;
    }

    .nav-items ul{
        display: flex;
        margin: 1rem;
    }

    .nav-items ul li{
        margin: 2rem;
    }

    .nav-items ul li a{
        color: white;
        font-family: segoe ui;
    }

    .nav-items ul li a:hover{
        color: rgb(156, 163, 175);
    }

    .content{
        border: 1px solid black;
        width: 700px;
        height: 60vh;
        margin: 2rem 9rem;
        border: none;
    }

    .title p{
        color:white;
        font-family: segoe ui;
        font-size: 3rem;
        font-weight: 700;
    }

    .description p{
        border: 1px solid black;
        width: 450px;
        border: none;
        color: rgb(230, 230, 230);
        margin: 1rem 0rem;
        font-weight: 100;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
    }


    .btn button{
        background: none;
        border: 1px solid white;
        padding: 10px 20px;
        color: white;
        font-weight: lighter;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 2rem 0rem;
    }

    .btn button:hover{
        background: white;
        color: #0f172a;
        border: none;
        transition: 0.5s;
    }




  </style>
</head>
<body>

  <div id="bg">
    <div class="nav">
        <div class="app-label">
            <p style="color: white;">MY APP</p>
        </div>
        <div class="nav-items">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">FAQs</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </div>
    </div>

    <!---CONTENT-->

    <div class="content">
        <div class="title">
            <p>Landing Page</p>
        </div>

        <div class="description">
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iure unde corporis inventore fuga facere tenetur ipsam veniam odit culpa quasi cumque nisi hic adipisci earum repellat maiores ipsum, facilis maxime.</p>
        </div>

        <div class="btn">
            <button>SIGN IN</button>
        </div>
    </div>

  </div>
  <!-- THREE JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <!-- VANTA DOTS -->
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>

  <script>
    VANTA.DOTS({
      el: "#bg",

      mouseControls: true,
      touchControls: true,
      gyroControls: false,

      backgroundColor: 0x0f172a,

      color: 0x3b82f6,
      color2: 0x8b5cf6,

      showLines: false,

      size: 4.0,
      spacing: 40.0,
      speed: 0.1,

    })
  </script>

</body>
</html>
